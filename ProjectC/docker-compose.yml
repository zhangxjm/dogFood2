version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: whiteboard-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: whiteboard
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - whiteboard-network

  mysql:
    image: mysql:8.0
    container_name: whiteboard-mysql
    restart: unless-stopped
    ports:
      - "3007:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: whiteboard
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - whiteboard-network

  postgres:
    image: postgres:15-alpine
    container_name: whiteboard-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: whiteboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - whiteboard-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: whiteboard-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/whiteboard
    depends_on:
      - mongodb
    networks:
      - whiteboard-network
    volumes:
      - ./server/src:/app/src
    command: npm run dev

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: whiteboard-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - server
    networks:
      - whiteboard-network
    volumes:
      - ./client/src:/app/src
      - ./client/index.html:/app/index.html
    environment:
      - VITE_API_URL=http://localhost:3001
    command: npm run dev -- --host 0.0.0.0

networks:
  whiteboard-network:
    driver: bridge

volumes:
  mongodb_data:
  mongodb_config:
  mysql_data:
  postgres_data:
