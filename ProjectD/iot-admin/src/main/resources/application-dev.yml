server:
  port: 8080

spring:
  application:
    name: iot-management
  
  datasource:
    url: jdbc:h2:mem:iot_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

mqtt:
  enabled: false
  broker: tcp://localhost:1883
  username: admin
  password: public
  client-id: iot-server-dev
  keep-alive-interval: 60
  clean-session: true
  connection-timeout: 30

logging:
  level:
    com.iot: debug
    org.springframework.web: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
